name: Docs

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: npm run docs:build

      - uses: peaceiris/actions-gh-pages@v3
        with:
          publish_dir: docs/.vitepress/dist